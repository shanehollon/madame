<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madame</title>
    <link rel="stylesheet" href="/styles/github.css" />
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <div id="app">
      <div class="titlebar" id="titlebar" data-tauri-drag-region>
        <img class="app-icon" src="/madame_logo.png" alt="" data-tauri-drag-region />
        <span class="dot"></span>
        <span class="filename" data-tauri-drag-region>Untitled</span>
        <div class="window-controls">
          <button id="btn-min" title="Minimize" aria-label="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="1" y="5" width="8" height="1" fill="currentColor"/></svg>
          </button>
          <button id="btn-max" title="Maximize" aria-label="Maximize">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor"/></svg>
          </button>
          <button id="btn-close" class="close" title="Close" aria-label="Close">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor" fill="none"/></svg>
          </button>
        </div>
      </div>
      <div class="panes" id="panes">
        <div class="pane editor-pane" id="editor-pane">
          <textarea id="editor" spellcheck="false" class="wrap"></textarea>
        </div>
        <div class="splitter" id="splitter"></div>
        <div class="pane preview-pane" id="preview-pane">
          <div class="markdown-body" id="preview"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
